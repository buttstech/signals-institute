<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Signals Institute</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .container { max-width: 700px; }
        h1 { font-size: 3rem; margin-bottom: 1rem; letter-spacing: 0.1em; }
        .subtitle { font-size: 1.5rem; opacity: 0.8; margin-bottom: 2rem; }
        p { font-size: 1.1rem; line-height: 1.8; opacity: 0.9; }
        .badge {
            display: inline-block;
            margin-top: 3rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2rem;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Signals Institute</h1>
        <p class="subtitle">Butts Philanthropy</p>
        <p>Advancing research, education, and community engagement through innovative programs and initiatives.</p>
        <span class="badge">Coming Soon</span>
    </div>
</body>
</html>
